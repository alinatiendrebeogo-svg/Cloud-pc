name: Cloud PC
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

        - name: Run Cloud PC
      run: |
        echo "Cloud PC en cours d'exécution !"

    - name: Installation et lancement de Sunshine
      run: |
        sudo apt update
        sudo apt install -y curl
        wget https://github.com/LizardByte/Sunshine/releases/download/v0.23.1/sunshine-ubuntu-22.04-amd64.deb -O sunshine.deb
        sudo apt install -y ./sunshine.deb
        sunshine &
        
    - name: Garder la machine active
      run: |
        sleep 21600
       
